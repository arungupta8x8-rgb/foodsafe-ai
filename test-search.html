<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search History Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 800px; margin: 0 auto; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; margin: 5px; cursor: pointer; }
        .result { background: #f8f9fa; padding: 15px; border-radius: 5px; margin: 10px 0; white-space: pre-wrap; font-family: monospace; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Search History Debug Test</h1>
        
        <button onclick="testLocalStorage()">Test localStorage</button>
        <button onclick="addTestItem()">Add Test Item</button>
        <button onclick="clearHistory()">Clear History</button>
        <button onclick="showHistory()">Show History</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        function testLocalStorage() {
            const data = localStorage.getItem('searchHistory');
            document.getElementById('result').textContent = `localStorage contains: ${data}`;
        }

        function addTestItem() {
            const testItem = {
                id: Date.now().toString(),
                query: 'Test: ' + new Date().toLocaleTimeString(),
                timestamp: new Date().toISOString(),
                response: 'Test response',
                category: 'general'
            };
            
            let history = [];
            const existing = localStorage.getItem('searchHistory');
            if (existing) {
                history = JSON.parse(existing);
            }
            
            history.unshift(testItem);
            localStorage.setItem('searchHistory', JSON.stringify(history));
            
            document.getElementById('result').textContent = `Added test item. History now has ${history.length} items.`;
        }

        function clearHistory() {
            localStorage.removeItem('searchHistory');
            document.getElementById('result').textContent = 'History cleared from localStorage';
        }

        function showHistory() {
            const data = localStorage.getItem('searchHistory');
            if (data) {
                const history = JSON.parse(data);
                document.getElementById('result').textContent = `History (${history.length} items):\n\n${JSON.stringify(history, null, 2)}`;
            } else {
                document.getElementById('result').textContent = 'No history found in localStorage';
            }
        }
    </script>
</body>
</html>
